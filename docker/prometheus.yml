global:
  scrape_interval: 15s

scrape_configs:
  - job_name: amline-backend
    metrics_path: /metrics
    static_configs:
      - targets: ["backend:8000"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: amline-backend

  - job_name: amline-ml-pricing
    metrics_path: /metrics
    static_configs:
      - targets: ["ml-pricing:8090"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: amline-ml-pricing
