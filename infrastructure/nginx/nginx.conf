worker_processes auto;

events {
  worker_connections 8192;
  multi_accept on;
}

http {
  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  keepalive_requests 10000;
  server_tokens off;

  client_max_body_size 1m;
  client_body_timeout 15s;
  client_header_timeout 15s;
  send_timeout 15s;

  gzip on;
  gzip_comp_level 5;
  gzip_min_length 1024;
  gzip_types
    text/plain
    text/css
    application/json
    application/javascript
    application/xml
    application/rss+xml
    image/svg+xml;

  limit_req_zone $binary_remote_addr zone=api_rps:20m rate=100r/s;
  limit_conn_zone $binary_remote_addr zone=per_ip_conn:20m;

  upstream api_upstream {
    least_conn;
    keepalive 256;
    server api:8080 max_fails=3 fail_timeout=10s;
  }

  upstream web_upstream {
    least_conn;
    keepalive 256;
    server web:3000 max_fails=3 fail_timeout=10s;
  }

  server {
    listen 80 reuseport;

    location /api/ {
      limit_req zone=api_rps burst=200 nodelay;
      limit_conn per_ip_conn 50;

      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Request-Id $request_id;
      proxy_connect_timeout 3s;
      proxy_send_timeout 15s;
      proxy_read_timeout 15s;
      proxy_next_upstream error timeout http_502 http_503 http_504;
      proxy_pass http://api_upstream;
    }

    location /_next/static/ {
      expires 1h;
      add_header Cache-Control "public, immutable";
      proxy_set_header Host $host;
      proxy_pass http://web_upstream;
    }

    location / {
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Request-Id $request_id;
      proxy_connect_timeout 3s;
      proxy_send_timeout 15s;
      proxy_read_timeout 15s;
      proxy_next_upstream error timeout http_502 http_503 http_504;
      proxy_pass http://web_upstream;
    }
  }
}
