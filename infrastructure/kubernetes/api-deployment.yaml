apiVersion: apps/v1
kind: Deployment
metadata:
  name: amline-api
  labels:
    app.kubernetes.io/name: amline-api
    app.kubernetes.io/part-of: amline-platform
spec:
  replicas: 6
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: amline-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: amline-api
        app.kubernetes.io/part-of: amline-platform
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: api
          image: ghcr.io/amline/platform-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: PORT
              value: "8080"
            - name: NODE_ENV
              value: "production"
            - name: NEXT_PUBLIC_API_BASE_URL
              value: "https://api.amline.ir/api"
            - name: MAX_IN_FLIGHT_REQUESTS
              value: "10000"
            - name: READY_IN_FLIGHT_THRESHOLD
              value: "9000"
            - name: SERVER_REQUEST_TIMEOUT_MS
              value: "15000"
            - name: SHUTDOWN_GRACE_PERIOD_MS
              value: "20000"
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "2Gi"
          startupProbe:
            httpGet:
              path: /api/live
              port: http
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /api/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/live
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 10"]
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: amline-api
