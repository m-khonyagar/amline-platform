version: '3.9'

services:
  nginx:
    image: nginx:latest
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - people
      - advisor
      - ops
      - auth
      - contract
      - signature
      - advisor-service

  people:
    build: ./apps/people
    restart: always

  advisor:
    build: ./apps/advisor
    restart: always

  ops:
    build: ./apps/ops
    restart: always

  auth:
    build: ./services/auth
    restart: always

  contract:
    build: ./services/contract
    restart: always

  signature:
    build: ./services/signature
    restart: always

  advisor-service:
    build: ./services/advisor
    restart: always

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
