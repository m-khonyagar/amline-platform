version: '3.9'
services:
  auth:
    build: ./services/auth
    ports:
      - "9001:8000"
  contract:
    build: ./services/contract
    ports:
      - "9002:8000"
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: amline
      POSTGRES_PASSWORD: amline
      POSTGRES_DB: amline
    ports:
      - "5432:5432"
  redis:
    image: redis:7
    ports:
      - "6379:6379"
