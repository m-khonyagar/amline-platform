name: Auto Agent Workflow

on:
  issues:
    types: [opened, labeled]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'GitHub Issue number to process'
        required: true
        type: number
      title:
        description: 'Issue title'
        required: true
        type: string
      body:
        description: 'Issue body / description'
        required: false
        type: string

# Only one agent run per issue at a time
concurrency:
  group: agent-issue-${{ github.event.issue.number || inputs.issue_number }}
  cancel-in-progress: false

jobs:
  run-agent:
    runs-on: ubuntu-latest
    # Only run when the 'agent' label is present (safety gate)
    if: >
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.issue.labels.*.name, 'agent')

    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install agent dependencies
        run: pip install -r requirements.txt

      - name: Run Self-Improving AI Agent
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          AGENT_LLM_PROVIDER: ${{ vars.AGENT_LLM_PROVIDER || 'ollama' }}
          AGENT_LLM_MODEL: ${{ vars.AGENT_LLM_MODEL || 'mistral' }}
          AGENT_LLM_BASE_URL: ${{ vars.AGENT_LLM_BASE_URL || 'http://localhost:11434' }}
          AGENT_LLM_API_KEY: ${{ secrets.AGENT_LLM_API_KEY || '' }}
          HF_API_TOKEN: ${{ secrets.HF_API_TOKEN || '' }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY || '' }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY || '' }}
          AGENT_BASE_BRANCH: main
          AGENT_LOG_LEVEL: INFO
          AGENT_PARALLEL: 'true'
          # Issue fields passed as env vars — never interpolated into code — to prevent injection
          ISSUE_NUMBER: ${{ github.event.issue.number || inputs.issue_number }}
          ISSUE_TITLE: ${{ github.event.issue.title || inputs.title }}
          ISSUE_BODY: ${{ github.event.issue.body || inputs.body }}
        run: python agents/run_agent.py

      - name: Comment on issue with agent report
        if: always() && github.event_name == 'issues'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const status = '${{ job.status }}' === 'success' ? '✅' : '❌';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `${status} **AI Agent** finished processing this issue.\n\nSee the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.`
            });
