name: Admin UI tests (Vitest + Playwright)

on:
  workflow_dispatch:
  push:
    branches: [main, develop]
    paths:
      - 'admin-ui/**'
      - '.github/workflows/admin-ui-property-tests.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'admin-ui/**'
      - '.github/workflows/admin-ui-property-tests.yml'

jobs:
  vitest-pbt:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admin-ui

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: admin-ui/package-lock.json

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install; fi

      - name: Vitest (incl. fast-check)
        run: npm run test

  # Playwright is flaky vs a11y/UI copy; keep it on main/develop and manual dispatch — not a PR merge gate.
  playwright-e2e:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admin-ui

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: admin-ui/package-lock.json

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install; fi

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Playwright E2E
        run: npx playwright test
        env:
          CI: true
