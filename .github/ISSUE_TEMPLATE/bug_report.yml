name: Bug Report
description: Report a defect with enough detail to reproduce it.
title: "[bug] "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug. Please include exact steps, affected area, and any logs.
  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - backend
        - admin-ui
        - amline-ui
        - site
        - seo-dashboard
        - pdf-generator
        - taskflow
        - figma
        - ci-cd
        - docs
    validations:
      required: true
  - type: textarea
    id: current
    attributes:
      label: Current behavior
      placeholder: What happens today?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What should happen instead?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to ...
        2. Run ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      render: shell
    validations:
      required: false
  - type: textarea
    id: env
    attributes:
      label: Environment
      description: OS, browser, node/python version, branch, commit, etc.
      render: markdown
    validations:
      required: false
