<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>2048</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <div class="title">
          <div class="name">2048</div>
          <div class="subtitle">Join the tiles and get to <strong>2048</strong>.</div>
        </div>
        <div class="scores">
          <div class="scoreBox">
            <div class="scoreLabel">Score</div>
            <div class="scoreValue" id="score">0</div>
          </div>
          <div class="scoreBox">
            <div class="scoreLabel">Best</div>
            <div class="scoreValue" id="best">0</div>
          </div>
        </div>
      </header>

      <div class="controls">
        <button class="btn" id="newGame">New Game</button>
        <div class="hint">Use arrow keys, WASD, or swipe.</div>
      </div>

      <main class="boardWrap">
        <div class="board" id="board" aria-label="2048 board" role="application">
          <div class="grid" id="grid"></div>
          <div class="tiles" id="tiles" aria-live="polite"></div>
          <div class="overlay hidden" id="overlay" role="dialog" aria-modal="true">
            <div class="overlayCard">
              <div class="overlayTitle" id="overlayTitle">Game Over</div>
              <div class="overlayText" id="overlayText">Try again?</div>
              <div class="overlayButtons">
                <button class="btn" id="tryAgain">Try Again</button>
                <button class="btn secondary" id="keepPlaying">Keep Playing</button>
              </div>
            </div>
          </div>
        </div>
      </main>

      <footer class="footer">
        <div class="footnote">Tip: Quick swipes work best. Animations respect “reduced motion”.</div>
      </footer>
    </div>

    <script src="app.js" defer></script>
  </body>
</html>
