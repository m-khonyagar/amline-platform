<!DOCTYPE html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Super-Agent</title>
    <link rel="stylesheet" href="/ui-assets/styles.css" />
    <!-- highlight.js — syntax highlighting for code blocks -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css"
      id="hljs-theme-dark"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css"
      id="hljs-theme-light"
      disabled
    />
  </head>
  <body>
    <div class="shell">

      <!-- ── Top bar ────────────────────────────────────── -->
      <header class="topbar">
        <div class="topbar-logo">
          <span class="logo-icon">⚡</span>
          <span class="logo-text">Super-Agent</span>
        </div>

        <nav class="pipeline" id="pipeline" aria-label="مراحل پردازش">
          <span class="pip-step" data-agent="planner">📋 برنامه</span>
          <span class="pip-arrow">›</span>
          <span class="pip-step" data-agent="brain">🧠 تحلیل</span>
          <span class="pip-arrow">›</span>
          <span class="pip-step" data-agent="researcher">🔍 تحقیق</span>
          <span class="pip-arrow">›</span>
          <span class="pip-step" data-agent="coder">💻 کد</span>
          <span class="pip-arrow">›</span>
          <span class="pip-step" data-agent="tester">🧪 تست</span>
          <span class="pip-arrow">›</span>
          <span class="pip-step" data-agent="executor">⚡ اجرا</span>
        </nav>

        <div class="topbar-right">
          <div class="topbar-status">
            <span class="status-dot" id="statusDot"></span>
            <span class="status-label" id="statusLabel">بررسی…</span>
          </div>
          <button class="icon-btn" id="themeToggle" title="تغییر تم (روشن/تاریک)" aria-label="تغییر تم">☀️</button>
          <button class="icon-btn" id="shortcutBtn" title="کلیدهای میانبر (?)" aria-label="کلیدهای میانبر">⌨️</button>
        </div>
      </header>

      <!-- Progress bar (sits flush under topbar) -->
      <div class="progress-rail" aria-hidden="true">
        <div class="progress-bar" id="progressBar"></div>
      </div>

      <!-- ── Body (sidebar + main) ──────────────────────── -->
      <div class="body">

        <!-- Sidebar: session history -->
        <aside class="sidebar">
          <div class="sidebar-header">
            <span>تاریخچه</span>
            <button class="new-btn" id="newBtn" title="درخواست جدید">＋</button>
          </div>
          <div class="sidebar-search">
            <input
              type="search"
              id="searchInput"
              placeholder="جستجو…"
              aria-label="جستجو در تاریخچه جلسات"
            />
          </div>
          <div class="session-list" id="sessionList">
            <p class="sidebar-empty">هنوز جلسه‌ای ثبت نشده</p>
          </div>
        </aside>

        <!-- Main content: welcome or live step feed -->
        <main class="main">

          <!-- Welcome screen -->
          <div class="welcome" id="welcome">
            <div class="welcome-icon">⚡</div>
            <h2 class="welcome-title">Super-Agent</h2>
            <p class="welcome-sub">درخواست خود را در پایین بنویسید.</p>
            <div class="examples">
              <p class="examples-label">نمونه‌ها:</p>
              <button class="example-btn" data-goal="یک API برای مدیریت کاربران با FastAPI بنویس">
                API کاربران با FastAPI
              </button>
              <button class="example-btn" data-goal="تابعی برای تبدیل تاریخ شمسی به میلادی در Python بنویس">
                تبدیل تاریخ شمسی
              </button>
              <button class="example-btn" data-goal="یک component React برای نمایش جدول داده‌ها با قابلیت مرتب‌سازی بنویس">
                جدول React با مرتب‌سازی
              </button>
            </div>
          </div>

          <!-- Live step feed -->
          <div class="steps-feed" id="stepsFeed" hidden></div>

          <!-- Error banner -->
          <div class="error-banner" id="errorBanner" hidden role="alert"></div>

        </main>
      </div>

      <!-- ── Input bar ───────────────────────────────────── -->
      <footer class="inputbar">
        <div class="inputbar-inner">
          <textarea
            id="goalInput"
            class="goal-input"
            placeholder="درخواست خود را بنویسید…  (Ctrl+Enter یا ⌘Enter برای ارسال)"
            rows="2"
            aria-label="متن درخواست"
          ></textarea>
          <div class="inputbar-controls">
            <label class="toggle-label">
              <input type="checkbox" id="planOnly" />
              <span>فقط برنامه‌ریزی</span>
            </label>
            <label class="toggle-label">
              <input type="checkbox" id="skipBrain" />
              <span>بدون LLM</span>
            </label>
            <input
              type="password"
              id="tokenInput"
              class="token-input"
              placeholder="توکن (اختیاری)"
              aria-label="توکن احراز هویت"
            />
            <button id="downloadBtn" class="dl-btn" hidden aria-label="دانلود نتیجه جلسه">⬇ دانلود</button>
            <button id="stopBtn" class="stop-btn" hidden aria-label="توقف اجرا">◼ توقف</button>
            <button id="sendBtn" class="send-btn" aria-label="ارسال درخواست">
              <span id="sendLabel">ارسال</span>
              <span class="send-icon">↵</span>
            </button>
          </div>
        </div>
      </footer>

    </div><!-- .shell -->

    <!-- ── Keyboard shortcut modal ─────────────────────── -->
    <div class="modal-overlay" id="shortcutModal" hidden role="dialog" aria-modal="true" aria-label="کلیدهای میانبر">
      <div class="modal">
        <div class="modal-header">
          <span>کلیدهای میانبر</span>
          <button class="modal-close" id="closeShortcutModal" aria-label="بستن">✕</button>
        </div>
        <table class="shortcut-table">
          <tbody>
            <tr><td><kbd>Ctrl</kbd> + <kbd>Enter</kbd></td><td>ارسال درخواست</td></tr>
            <tr><td><kbd>?</kbd></td><td>نمایش / بستن این پانل</td></tr>
            <tr><td><kbd>Esc</kbd></td><td>بستن پانل</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="/ui-assets/app.js"></script>
  </body>
</html>
