# Scrape Amline API /metrics — API must run on host with AMLINE_METRICS_ENABLED=1
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: amline-api
    metrics_path: /metrics
    static_configs:
      - targets:
          - host.docker.internal:8000
        labels:
          service: amline-api
